<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADVANCE | Acceso de Mando</title>
    <style>
        body { 
            background: #050505; 
            color: #00ff88; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .login-box { 
            border: 1px solid #111; 
            background: #0a0a0a; 
            padding: 50px; 
            border-radius: 20px; 
            text-align: center; 
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.1); 
            max-width: 400px;
            width: 90%;
        }
        h1 { letter-spacing: 15px; margin-bottom: 5px; font-weight: 900; }
        p { color: #444; text-transform: uppercase; font-size: 0.7em; margin-bottom: 30px; letter-spacing: 2px; }
        input { 
            background: #000; 
            border: 1px solid #222; 
            color: white; 
            padding: 15px; 
            width: 100%; 
            border-radius: 8px; 
            margin-bottom: 20px; 
            box-sizing: border-box;
            text-align: center;
            font-size: 1.1em;
        }
        input:focus { border-color: #00ff88; outline: none; }
        button { 
            background: #00ff88; 
            color: black; 
            border: none; 
            padding: 15px; 
            width: 100%; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
            text-transform: uppercase; 
            transition: 0.3s;
        }
        button:hover { box-shadow: 0 0 20px #00ff88; transform: scale(1.02); }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>ADVANCE</h1>
        <p>Núcleo de Control de Activos</p>
        <form method="POST">
            <input type="password" name="password" placeholder="CLAVE MAESTRA" autofocus required>
            <button type="submit">ENTRAR AL SISTEMA</button>
        </form>
    </div>
</body>
</html>
